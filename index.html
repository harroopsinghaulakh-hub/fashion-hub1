<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch & Soul | Luxury Bespoke Embroidery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #000; color: #fff; overflow-x: hidden; margin: 0; }
        h1, h2, h3, .luxury-font { font-family: 'Bodoni Moda', serif; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }
        #splash-quote {
            font-family: 'Bodoni Moda', serif; font-size: 1.5rem; font-style: italic;
            text-align: center; max-width: 80%; opacity: 0; transform: translateY(20px);
            transition: all 1s ease-out; color: #fff;
        }

        /* Video Hero */
        .hero-video-container { position: relative; height: 100vh; width: 100%; overflow: hidden; background: #000; }
        video.bg-video {
            position: absolute; top: 50%; left: 50%; min-width: 100%; min-height: 100%;
            transform: translate(-50%, -50%); object-fit: cover; opacity: 0.5;
        }
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3), rgba(0,0,0,0.9)); }

        #main-ui { opacity: 0; transition: opacity 2s ease-in; }
        
        /* Modal Window */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body>

    <!-- Splash Screen -->
    <div id="splash-screen">
        <div class="text-[10px] uppercase tracking-[1em] mb-12 opacity-40 italic">Stitch & Soul</div>
        <p id="splash-quote"></p>
    </div>

    <div id="main-ui">
        <!-- Navigation -->
        <nav class="fixed top-0 w-full z-50 px-10 py-10 flex justify-between items-center mix-blend-difference">
            <div class="text-2xl font-bold tracking-[0.4em] uppercase">STITCH & SOUL</div>
            <div class="hidden md:flex gap-14 text-[9px] uppercase tracking-[0.5em] font-light">
                <a href="#collection">Collection</a>
                <a href="#custom">Bespoke Inquiry</a>
            </div>
            <i class="fa-solid fa-bag-shopping text-sm"></i>
        </nav>

        <!-- Hero Section -->
        <section class="hero-video-container">
            <!-- PEXELS STOCKS ARE MORE RELIABLE -->
            <video autoplay muted loop playsinline class="bg-video">
                <source src="https://player.vimeo.com/external/477114620.sd.mp4?s=e52d8e411b0596395b3f11409f5f1687498c0d97&profile_id=164&oauth2_token_id=57447761" type="video/mp4">
            </video>
            <div class="overlay"></div>
            <div class="relative h-full flex flex-col items-center justify-center text-center px-6">
                <span class="text-[9px] uppercase tracking-[0.8em] mb-4 opacity-50 italic">Industrial Excellence</span>
                <h1 class="text-5xl md:text-8xl mb-10 italic font-light">Precision <br>meets Passion.</h1>
                <a href="#collection" class="border border-white/20 px-12 py-4 text-[9px] uppercase tracking-[0.4em] hover:bg-white hover:text-black transition-all duration-1000">Enter Archive</a>
            </div>
        </section>

        <!-- Full Collection Grid -->
        <section id="collection" class="py-40 px-10 bg-black">
            <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-16">
                <!-- Hoodie -->
                <div onclick="openItem('Signature Hoodie', '₹2,499', 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=800', 'Heavyweight cotton with high-density architectural stitching.')" class="cursor-pointer group">
                    <div class="aspect-[3/4] overflow-hidden mb-6"><img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000"></div>
                    <h3 class="text-xl italic">Signature Hoodie</h3>
                    <p class="text-[10px] tracking-[0.2em] opacity-50 uppercase">Explore Piece</p>
                </div>
                <!-- Cap -->
                <div onclick="openItem('3D Puff Cap', '₹899', 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=800', 'High-structure snapback featuring industrial 3D puff embroidery.')" class="cursor-pointer group">
                    <div class="aspect-[3/4] overflow-hidden mb-6"><img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000"></div>
                    <h3 class="text-xl italic">3D Puff Cap</h3>
                    <p class="text-[10px] tracking-[0.2em] opacity-50 uppercase">Explore Piece</p>
                </div>
                <!-- Tee -->
                <div onclick="openItem('Essential Tee', '₹1,199', 'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?q=80&w=800', 'Minimalist logo placement on 240GSM premium organic cotton.')" class="cursor-pointer group">
                    <div class="aspect-[3/4] overflow-hidden mb-6"><img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000"></div>
                    <h3 class="text-xl italic">Essential Tee</h3>
                    <p class="text-[10px] tracking-[0.2em] opacity-50 uppercase">Explore Piece</p>
                </div>
            </div>
        </section>

        <!-- Formspree Section -->
        <section id="custom" class="py-40 px-10 bg-[#0a0a0a] border-t border-white/5 text-center">
            <h2 class="text-5xl italic mb-16">Request a Quote</h2>
            <form action="https://formspree.io/f/YOUR_ID_HERE" method="POST" class="max-w-xl mx-auto space-y-8">
                <input type="text" name="name" placeholder="NAME" required class="w-full bg-transparent border-b border-white/10 py-5 outline-none focus:border-white transition-colors text-[9px] tracking-widest uppercase">
                <textarea name="message" placeholder="PROJECT DETAILS" required class="w-full bg-transparent border-b border-white/10 py-5 h-32 outline-none focus:border-white transition-colors text-[9px] tracking-widest uppercase"></textarea>
                <button type="submit" class="w-full bg-white text-black py-6 uppercase tracking-[0.5em] text-[9px] hover:bg-slate-200 transition font-bold">Submit Inquiry</button>
            </form>
        </section>
    </div>

    <!-- Product Modal -->
    <div id="pModal" class="modal" onclick="closeItem(event)">
        <div class="bg-white text-black max-w-5xl w-full flex flex-col md:flex-row relative" onclick="event.stopPropagation()">
            <button onclick="closeItem(null)" class="absolute top-8 right-8 text-2xl font-light">✕</button>
            <div class="w-full md:w-1/2 h-[50vh] md:h-[80vh]"><img id="mImg" src="" class="w-full h-full object-cover"></div>
            <div class="p-16 w-full md:w-1/2 flex flex-col justify-center text-left">
                <h2 id="mTitle" class="text-5xl italic mb-4"></h2>
                <p id="mPrice" class="text-2xl mb-8 font-light tracking-widest"></p>
                <p id="mDesc" class="text-slate-500 mb-12 font-light leading-relaxed"></p>
                <a href="#custom" onclick="closeItem(null)" class="bg-black text-white py-5 text-center text-[10px] uppercase tracking-[0.3em]">Enquire for Bespoke</a>
            </div>
        </div>
    </div>

    <script>
        const quotes = [
            "“Luxury is in each detail.”",
            "“Precision is the soul of craftsmanship.”",
            "“Elegance is the only beauty that never fades.”",
            "“Bespoke is the ultimate form of self-expression.”"
        ];

        window.onload = () => {
            const qBox = document.getElementById('splash-quote');
            const sScreen = document.getElementById('splash-screen');
            const ui = document.getElementById('main-ui');

            qBox.innerText = quotes[Math.floor(Math.random() * quotes.length)];

            setTimeout(() => {
                qBox.style.opacity = "1";
                qBox.style.transform = "translateY(0)";
            }, 500);

            setTimeout(() => {
                sScreen.style.opacity = "0";
                sScreen.style.visibility = "hidden";
                ui.style.opacity = "1";
            }, 3500);
        };

        function openItem(t, p, i, d) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mPrice').innerText = p;
            document.getElementById('mImg').src = i;
            document.getElementById('mDesc').innerText = d;
            document.getElementById('pModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeItem(e) {
            if (e === null || e.target.id === 'pModal') {
                document.getElementById('pModal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stitch & Soul | Premium Custom Embroidery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700&display=swap');
        body { font-family: 'Outfit', sans-serif; scroll-behavior: smooth; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <!-- Nav -->
    <nav class="glass-nav fixed top-0 w-full z-50 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-6 h-20 flex justify-between items-center">
            <div class="text-2xl font-black tracking-tight">STITCH & SOUL</div>
            <div class="hidden md:flex gap-10 text-sm font-bold uppercase tracking-widest">
                <a href="#shop" class="hover:text-blue-600 transition">Collection</a>
                <a href="#custom" class="hover:text-blue-600 transition">Custom Orders</a>
            </div>
            <i class="fa-solid fa-cart-shopping text-xl"></i>
        </div>
    </nav>

    <!-- Hero -->
    <header class="pt-40 pb-20 px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-2 gap-16 items-center">
            <div>
                <span class="inline-block px-4 py-1 bg-blue-50 text-blue-600 rounded-full text-xs font-bold mb-6 uppercase">Factory Direct</span>
                <h1 class="text-6xl md:text-8xl font-black leading-tight mb-8">Elevated <br><span class="text-blue-600">Embroidery.</span></h1>
                <p class="text-xl text-slate-500 mb-10 max-w-lg leading-relaxed">Industrial precision from our factory to your brand. Premium thread-work on demand.</p>
                <a href="#shop" class="bg-slate-900 text-white px-10 py-5 rounded-2xl font-bold shadow-2xl hover:-translate-y-1 transition inline-block">Shop Now</a>
            </div>
            <img src="https://images.unsplash.com/photo-1516738901171-8eb4fc13bd20?auto=format&fit=crop&q=80&w=1200" class="rounded-[3rem] shadow-3xl hidden lg:block">
        </div>
    </header>

    <!-- Collection (With Pop-up logic) -->
    <section id="shop" class="max-w-7xl mx-auto py-24 px-6">
        <h2 class="text-4xl font-black mb-12 uppercase tracking-tighter">The Collection</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-10">
            
            <div onclick="openItem('Custom Script Hoodie', '₹2,499', 'https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800', 'Heavyweight cotton hoodie with high-density embroidery.')" class="cursor-pointer group">
                <div class="overflow-hidden rounded-[2.5rem] bg-slate-200 aspect-[3/4] mb-6">
                    <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="text-2xl font-bold">Custom Script Hoodie</h3>
                <p class="text-blue-600 font-black">₹2,499</p>
            </div>

            <div onclick="openItem('3D Puff Snapback', '₹899', 'https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&q=80&w=800', 'Classic snapback featuring premium 3D puff embroidery.')" class="cursor-pointer group">
                <div class="overflow-hidden rounded-[2.5rem] bg-slate-200 aspect-[3/4] mb-6">
                    <img src="https://images.unsplash.com/photo-1588850561407-ed78c282e89b?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="text-2xl font-bold">3D Puff Snapback</h3>
                <p class="text-blue-600 font-black">₹899</p>
            </div>

            <div onclick="openItem('Essential Tee', '₹1,199', 'https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&q=80&w=800', '100% organic cotton with minimalist chest embroidery.')" class="cursor-pointer group">
                <div class="overflow-hidden rounded-[2.5rem] bg-slate-200 aspect-[3/4] mb-6">
                    <img src="https://images.unsplash.com/photo-1618354691373-d851c5c3a990?auto=format&fit=crop&q=80&w=800" class="w-full h-full object-cover group-hover:scale-105 transition duration-500">
                </div>
                <h3 class="text-2xl font-bold">Essential Tee</h3>
                <p class="text-blue-600 font-black">₹1,199</p>
            </div>

        </div>
    </section>

    <!-- Custom Quote Section (KEEP YOUR ID HERE) -->
    <section id="custom" class="bg-slate-950 py-32 px-6">
        <div class="max-w-xl mx-auto">
            <div class="bg-slate-900 p-10 rounded-[3rem] border border-slate-800">
                <h2 class="text-3xl font-bold text-white text-center mb-8">Request a Quote</h2>
                
                <!-- CHANGE 'YOUR_ID_HERE' TO YOUR FORMSPREE CODE -->
                <form action="https://formspree.io/f/mvzllnla" method="POST" class="space-y-4">
                    <input type="text" name="name" placeholder="Full Name" required class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-blue-600 transition">
                    <input type="email" name="email" placeholder="Email Address" required class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white outline-none focus:border-blue-600 transition">
                    <textarea name="message" placeholder="Details (Quantity, Design, etc.)" required class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white h-32 outline-none focus:border-blue-600 transition"></textarea>
                    <button type="submit" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl hover:bg-blue-500 transition shadow-xl shadow-blue-600/20">Send Inquiry</button>
                </form>

            </div>
        </div>
    </section>

    <!-- Pop-up Window -->
    <div id="pModal" class="modal" onclick="closeItem(event)">
        <div class="bg-white max-w-4xl w-full rounded-[3rem] overflow-hidden flex flex-col md:flex-row relative" onclick="event.stopPropagation()">
            <button onclick="closeItem(null)" class="absolute top-6 right-6 text-2xl font-bold z-10"><i class="fa-solid fa-xmark"></i></button>
            <div class="w-full md:w-1/2 h-80 md:h-auto"><img id="mImg" src="" class="w-full h-full object-cover"></div>
            <div class="w-full md:w-1/2 p-10 flex flex-col justify-center">
                <h2 id="mTitle" class="text-4xl font-black mb-2"></h2>
                <p id="mPrice" class="text-2xl font-bold text-blue-600 mb-6"></p>
                <p id="mDesc" class="text-slate-500 mb-10 leading-relaxed"></p>
                <a href="#custom" onclick="closeItem(null)" class="bg-slate-900 text-white py-4 rounded-2xl font-bold text-center">Get Quote</a>
            </div>
        </div>
    </div>

    <script>
        function openItem(t, p, i, d) {
            document.getElementById('mTitle').innerText = t;
            document.getElementById('mPrice').innerText = p;
            document.getElementById('mImg').src = i;
            document.getElementById('mDesc').innerText = d;
            document.getElementById('pModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }
        function closeItem(e) {
            if (e === null || e.target.id === 'pModal') {
                document.getElementById('pModal').classList.remove('active');
                document.body.style.overflow = 'auto';
            }
        }
    </script>
</body>
</html>
